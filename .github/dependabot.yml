version: 2
updates:
  # Keeps the SHA-pinned actions in ci.yml current — Dependabot understands
  # the "@<sha> # vN" comment convention and updates both together.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Two Go modules: the core (x/sys only) and secmem-crypto (x/crypto,
  # edwards25519 — the dependency class that actually receives security
  # releases). Dependabot's gomod ecosystem does not recurse into nested
  # modules, so each needs its own directory entry.
  - package-ecosystem: "gomod"
    directories:
      - "/"
      - "/secmem-crypto"
    schedule:
      interval: "weekly"
