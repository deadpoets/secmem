name: setup-workspace
description: >
  Create the go.work that resolves the sibling modules in-repo, so secmem-crypto
  builds and tests against the core tree at this commit rather than the pinned
  release tag — a core change is exercised against its dependents before it is
  tagged. The modules are public, so no authenticated fetch is needed.
runs:
  using: composite
  steps:
    - run: go work init . ./secmem-crypto ./secmem-lint
      shell: bash
