name: CI

# Three Go modules live in this repo: the core (repo root), secmem-crypto/, and
# the secmem-lint analyzer. Go's ./... pattern does not cross module boundaries,
# so the library jobs run their steps once per library module — job names stay
# stable for branch protection. secmem-lint has its own job, which also dogfoods
# the analyzer over the two library modules.
#
# secmem-crypto's go.mod requires the released secmem tag (no replace directive,
# so the module is consumable outside this checkout). In-repo, every Go job runs
# the local setup-workspace action first: it authenticates module fetches with
# the job token — loading the module graph reads the required tag's go.mod from
# this private repo, so CI also proves the tag is actually published — then
# creates a go.work so crypto builds and tests against the sibling core tree at
# this commit rather than the pinned release.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.26"
  # Resolve this repo's own modules directly (authenticated git), never via the
  # public proxy/sumdb — the private module path shouldn't leak to either.
  GOPRIVATE: github.com/deadpoets/*

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: ./.github/actions/setup-workspace
        with:
          token: ${{ github.token }}
      - run: go test -race ./...
      - run: go test -race ./...
        working-directory: secmem-crypto

  test-arm64-linux:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: ./.github/actions/setup-workspace
        with:
          token: ${{ github.token }}
      - run: go test -race ./...
      - run: go test -race ./...
        working-directory: secmem-crypto

  # Exercise the GOEXPERIMENT=runtimesecret build. The register/stack/heap
  # erasure layer's integration tests are build-tag-gated to this experiment;
  # without this job they never run in automation. linux/amd64 and linux/arm64
  # only — the experiment's supported platforms.
  test-runtimesecret:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    env:
      GOEXPERIMENT: runtimesecret
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: ./.github/actions/setup-workspace
        with:
          token: ${{ github.token }}
      - run: go test -race ./...
      - run: go test -race ./...
        working-directory: secmem-crypto

  # Execute (not just compile) the suite on 32-bit x86. The wipe helpers
  # manipulate big.Word limbs, whose width differs on 386, so 386 must be RUN,
  # not merely built. 386 binaries execute natively on the amd64 runner via the
  # kernel's IA-32 emulation; CGO is off, so no 32-bit libc is needed. The race
  # detector requires 64-bit, so this job runs without -race.
  test-386-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: ./.github/actions/setup-workspace
        with:
          token: ${{ github.token }}
      - name: test (core)
        env:
          GOARCH: "386"
          CGO_ENABLED: "0"
        run: go test ./...
      - name: test (secmem-crypto)
        working-directory: secmem-crypto
        env:
          GOARCH: "386"
          CGO_ENABLED: "0"
        run: go test ./...

  # Run the AllocsPerRun no-heap-escape gates on the primary 64-bit targets.
  # They are //go:build !race (alloc counts are not meaningful under the race
  # detector), so the -race jobs skip them and only test-386-linux would
  # otherwise run them — but OpenInto's GCM path is assembly on amd64/arm64 and
  # generic on 386, so the deployed architectures must run the gates too.
  test-noescape:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: ./.github/actions/setup-workspace
        with:
          token: ${{ github.token }}
      - run: go test -run TestNoHeapEscape ./...
      - run: go test -run TestNoHeapEscape ./...
        working-directory: secmem-crypto

  # secmem-lint: the borrowing-closure analyzer (its own module, x/tools only).
  # Runs its analysistest suite, then dogfoods it — the library must pass its own
  # analyzer, with the intentional egresses carrying //nolint:secmem-lint.
  secmem-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: ./.github/actions/setup-workspace
        with:
          token: ${{ github.token }}
      - name: test analyzer
        working-directory: secmem-lint
        run: go test ./...
      - name: build vettool
        working-directory: secmem-lint
        run: go build -o "$RUNNER_TEMP/secmem-lint" ./cmd/secmem-lint
      - name: dogfood core
        run: go vet -vettool="$RUNNER_TEMP/secmem-lint" ./...
      - name: dogfood secmem-crypto
        working-directory: secmem-crypto
        run: go vet -vettool="$RUNNER_TEMP/secmem-lint" ./...

  cross-compile:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: ./.github/actions/setup-workspace
        with:
          token: ${{ github.token }}
      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build ./...
          cd secmem-crypto && go build ./...
      - name: compile test binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go test -c -o /dev/null .
          cd secmem-crypto && go test -c -o /dev/null .

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: ./.github/actions/setup-workspace
        with:
          token: ${{ github.token }}
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2
          working-directory: secmem-crypto
      - name: staticcheck (core)
        uses: dominikh/staticcheck-action@9716614d4101e79b4340dd97b10e54d68234e431 # v1
        with:
          version: latest
          install-go: false
      - name: staticcheck (secmem-crypto)
        uses: dominikh/staticcheck-action@9716614d4101e79b4340dd97b10e54d68234e431 # v1
        with:
          version: latest
          install-go: false
          working-directory: secmem-crypto
          cache-key: secmem-crypto
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2
          working-directory: secmem-lint
      - name: staticcheck (secmem-lint)
        uses: dominikh/staticcheck-action@9716614d4101e79b4340dd97b10e54d68234e431 # v1
        with:
          version: latest
          install-go: false
          working-directory: secmem-lint
          cache-key: secmem-lint

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: ./.github/actions/setup-workspace
        with:
          token: ${{ github.token }}
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...
      - run: govulncheck ./...
        working-directory: secmem-crypto
      - run: govulncheck ./...
        working-directory: secmem-lint

  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # API-compatibility radar: gorelease diffs each module's exported API against
  # its latest published tag and posts the report to the job summary, so an
  # unintended breaking change is a reviewed decision instead of a silent ship.
  # Report-only while the modules are 0.x (see the script's header for why a
  # hard gate would deadlock) — flip to a required, failing check at v1.0.
  apicompat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # gorelease needs the release tags
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: ./.github/actions/setup-workspace
        with:
          token: ${{ github.token }}
      - run: go install golang.org/x/exp/cmd/gorelease@latest
      - name: core
        run: bash .github/scripts/apicompat.sh . ''
      - name: secmem-crypto
        run: bash .github/scripts/apicompat.sh secmem-crypto 'secmem-crypto/'
      - name: secmem-lint
        run: bash .github/scripts/apicompat.sh secmem-lint 'secmem-lint/'
